<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Registro de Cosecha</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3; --bgc: #ffffff; --bgi: #ebebea;
      --tx: #1a1a18; --tm: #777; --bo: rgba(0,0,0,0.12); --bi: rgba(0,0,0,0.18);
      --green: #639922; --green-light: #EAF3DE; --green-text: #27500A;
      --red: #A32D2D; --red-light: #FCEBEB;
      --radius: 12px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#1a1a18; --bgc:#252523; --bgi:#2e2e2c; --tx:#f0f0ee; --tm:#999; --bo:rgba(255,255,255,0.1); --bi:rgba(255,255,255,0.15); }
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--tx); min-height:100vh; padding:1.5rem 1rem 5rem; }
    .app { max-width:900px; margin:0 auto; }

    /* Header */
    .header { margin-bottom:1.5rem; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; }
    .header h1 { font-size:22px; font-weight:500; }
    .header p { font-size:13px; color:var(--tm); margin-top:3px; }

    /* Btn */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:0 16px; height:40px; border-radius:var(--radius-sm); border:0.5px solid var(--bi); background:var(--bgc); color:var(--tx); font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .btn:active { opacity:0.75; }
    .btn.primary { background:var(--green); color:#fff; border-color:var(--green); }
    .btn.danger  { background:var(--red-light); color:var(--red); border-color:var(--red); }

    /* Summary */
    .summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:1.25rem; }
    .scard { background:var(--bgc); border:0.5px solid var(--bo); border-radius:var(--radius-sm); padding:12px 16px; }
    .scard label { font-size:11px; color:var(--tm); font-weight:500; text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:4px; }
    .scard .val { font-size:22px; font-weight:500; }
    .scard.green { background:var(--green-light); }
    .scard.green .val { color:var(--green-text); }

    /* Filters */
    .filters { display:flex; gap:10px; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
    .filters select, .filters input[type="text"] {
      height:38px; padding:0 12px; border:0.5px solid var(--bi); border-radius:var(--radius-sm);
      background:var(--bgc); color:var(--tx); font-size:14px; font-family:inherit; outline:none;
    }
    .filters select:focus, .filters input:focus { border-color:var(--green); }
    .filter-label { font-size:12px; color:var(--tm); font-weight:500; }

    /* Table */
    .table-wrap { background:var(--bgc); border:0.5px solid var(--bo); border-radius:var(--radius); overflow:hidden; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    thead th { padding:10px 14px; text-align:left; font-size:11px; font-weight:500; color:var(--tm); text-transform:uppercase; letter-spacing:.05em; border-bottom:0.5px solid var(--bo); background:var(--bgi); white-space:nowrap; }
    tbody tr { border-bottom:0.5px solid var(--bo); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--bgi); }
    tbody td { padding:11px 14px; vertical-align:middle; }
    td.ha { font-weight:500; }
    td.del { text-align:center; width:44px; }
    .del-btn { background:none; border:none; cursor:pointer; color:var(--tm); font-size:16px; padding:4px 8px; border-radius:6px; }
    .del-btn:hover { color:var(--red); background:var(--red-light); }
    .empty-row td { text-align:center; color:var(--tm); padding:32px; font-size:14px; }

    /* Modal overlay */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100; align-items:center; justify-content:center; padding:1rem; }
    .overlay.open { display:flex; }
    .modal { background:var(--bgc); border-radius:var(--radius); padding:1.5rem; width:100%; max-width:420px; }
    .modal h2 { font-size:17px; font-weight:500; margin-bottom:1.25rem; }
    .form-field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .form-field label { font-size:12px; color:var(--tm); font-weight:500; letter-spacing:.02em; }
    .form-field input, .form-field select {
      width:100%; height:44px; padding:0 12px; border:0.5px solid var(--bi);
      border-radius:var(--radius-sm); background:var(--bgi); color:var(--tx);
      font-size:16px; font-family:inherit; outline:none; -webkit-appearance:none;
    }
    .form-field input:focus, .form-field select:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(99,153,34,.1); }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:1.5rem; }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      thead th:nth-child(3), tbody td:nth-child(3) { display:none; }
      .filters { gap:8px; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <h1>Registro de cosecha</h1>
      <p id="subtitle">Cargando...</p>
    </div>
    <button class="btn primary" onclick="openModal()">+ Agregar registro</button>
  </div>

  <div class="summary">
    <div class="scard"><label>Total registros</label><div class="val" id="s-total">0</div></div>
    <div class="scard green"><label>Total hectáreas</label><div class="val" id="s-ha">0</div></div>
    <div class="scard"><label>Lotes distintos</label><div class="val" id="s-lotes">0</div></div>
    <div class="scard"><label>Cultivos distintos</label><div class="val" id="s-cultivos">0</div></div>
  </div>

  <div class="filters">
    <span class="filter-label">Filtrar:</span>
    <select id="f-maquina" onchange="render()"><option value="">Todas las máquinas</option></select>
    <select id="f-cultivo" onchange="render()"><option value="">Todos los cultivos</option></select>
    <input type="text" id="f-lote" placeholder="Buscar lote..." oninput="render()" style="width:140px">
    <button class="btn" onclick="clearFilters()">Limpiar</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Lote</th>
          <th>Cultivo</th>
          <th>Máquina</th>
          <th style="text-align:right">Hectáreas</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="modal" id="modal">
    <h2>Nuevo registro</h2>
    <div class="form-field">
      <label>Fecha</label>
      <input type="date" id="i-fecha">
    </div>
    <div class="form-field">
      <label>Lote</label>
      <input type="text" id="i-lote" placeholder="Ej: Lote 5" autocomplete="off">
    </div>
    <div class="form-field">
      <label>Cultivo</label>
      <input type="text" id="i-cultivo" placeholder="Ej: Soja, Maíz, Trigo" autocomplete="off">
    </div>
    <div class="form-field">
      <label>Máquina</label>
      <input type="text" id="i-maquina" placeholder="Ej: Cosechadora John Deere" autocomplete="off">
    </div>
    <div class="form-field">
      <label>Hectáreas</label>
      <input type="text" id="i-ha" inputmode="decimal" placeholder="Ej: 45.5" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="save()">Guardar</button>
    </div>
  </div>
</div>

<script>
  var STORAGE_KEY = 'cosecha_registros';

  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function parseNum(v) {
    var s = String(v).trim().replace(',', '.');
    var n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  function formatDate(d) {
    if (!d) return '—';
    var parts = d.split('-');
    if (parts.length !== 3) return d;
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }

  function unique(arr) {
    return arr.filter(function(v, i, a) { return v && a.indexOf(v) === i; }).sort();
  }

  function updateFilters(data) {
    var maqSelect = document.getElementById('f-maquina');
    var culSelect = document.getElementById('f-cultivo');
    var curMaq = maqSelect.value;
    var curCul = culSelect.value;

    var maquinas = unique(data.map(function(r){ return r.maquina; }));
    var cultivos = unique(data.map(function(r){ return r.cultivo; }));

    maqSelect.innerHTML = '<option value="">Todas las máquinas</option>';
    maquinas.forEach(function(m) {
      var o = document.createElement('option');
      o.value = m; o.textContent = m;
      if (m === curMaq) o.selected = true;
      maqSelect.appendChild(o);
    });

    culSelect.innerHTML = '<option value="">Todos los cultivos</option>';
    cultivos.forEach(function(c) {
      var o = document.createElement('option');
      o.value = c; o.textContent = c;
      if (c === curCul) o.selected = true;
      culSelect.appendChild(o);
    });
  }

  function render() {
    var data = loadData();
    var fMaq = document.getElementById('f-maquina').value;
    var fCul = document.getElementById('f-cultivo').value;
    var fLot = document.getElementById('f-lote').value.toLowerCase().trim();

    updateFilters(data);

    var filtered = data.filter(function(r) {
      return (!fMaq || r.maquina === fMaq)
          && (!fCul || r.cultivo === fCul)
          && (!fLot || r.lote.toLowerCase().indexOf(fLot) !== -1);
    });

    // Summary (over ALL data, not filtered)
    var totalHa = data.reduce(function(s, r){ return s + r.ha; }, 0);
    document.getElementById('s-total').textContent = data.length;
    document.getElementById('s-ha').textContent = totalHa % 1 === 0 ? totalHa : totalHa.toFixed(1);
    document.getElementById('s-lotes').textContent = unique(data.map(function(r){ return r.lote; })).length;
    document.getElementById('s-cultivos').textContent = unique(data.map(function(r){ return r.cultivo; })).length;

    var subtitle = data.length === 0
      ? 'Sin registros aún'
      : data.length + ' registro' + (data.length !== 1 ? 's' : '') + ' · ' + totalHa.toFixed(1) + ' ha totales';
    document.getElementById('subtitle').textContent = subtitle;

    var tbody = document.getElementById('tbody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No hay registros que coincidan</td></tr>';
      return;
    }

    // Sort by date desc
    filtered.sort(function(a, b){ return b.fecha.localeCompare(a.fecha); });

    tbody.innerHTML = filtered.map(function(r) {
      return '<tr>'
        + '<td>' + formatDate(r.fecha) + '</td>'
        + '<td>' + esc(r.lote) + '</td>'
        + '<td>' + esc(r.cultivo) + '</td>'
        + '<td>' + esc(r.maquina) + '</td>'
        + '<td class="ha" style="text-align:right">' + (r.ha % 1 === 0 ? r.ha : r.ha.toFixed(1)) + ' ha</td>'
        + '<td class="del"><button class="del-btn" onclick="del(\'' + r.id + '\')" title="Eliminar">✕</button></td>'
        + '</tr>';
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function del(id) {
    if (!confirm('¿Eliminar este registro?')) return;
    var data = loadData().filter(function(r){ return r.id !== id; });
    saveData(data);
    render();
  }

  function openModal() {
    // Set today's date
    var today = new Date();
    var y = today.getFullYear();
    var m = String(today.getMonth()+1).padStart(2,'0');
    var d = String(today.getDate()).padStart(2,'0');
    document.getElementById('i-fecha').value = y+'-'+m+'-'+d;
    document.getElementById('i-lote').value = '';
    document.getElementById('i-cultivo').value = '';
    document.getElementById('i-maquina').value = '';
    document.getElementById('i-ha').value = '';
    document.getElementById('overlay').classList.add('open');
    setTimeout(function(){ document.getElementById('i-lote').focus(); }, 100);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function closeIfOutside(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function save() {
    var fecha   = document.getElementById('i-fecha').value;
    var lote    = document.getElementById('i-lote').value.trim();
    var cultivo = document.getElementById('i-cultivo').value.trim();
    var maquina = document.getElementById('i-maquina').value.trim();
    var ha      = parseNum(document.getElementById('i-ha').value);

    if (!fecha || !lote || !cultivo || !maquina || ha <= 0) {
      alert('Completá todos los campos. Hectáreas debe ser mayor a 0.');
      return;
    }

    var data = loadData();
    data.push({
      id: Date.now().toString(),
      fecha: fecha,
      lote: lote,
      cultivo: cultivo,
      maquina: maquina,
      ha: ha
    });
    saveData(data);
    closeModal();
    render();
  }

  function clearFilters() {
    document.getElementById('f-maquina').value = '';
    document.getElementById('f-cultivo').value = '';
    document.getElementById('f-lote').value = '';
    render();
  }

  render();
</script>
</body>
</html>
